<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutomataHub</title>
    <link rel="stylesheet" href="./core.css" />
  </head>
  <body>
    <div id="app">
      <div id="main-tab-bar" class="tab-bar main-tab-bar" role="tablist" aria-label="Main tabs">
        <div class="tab-bar-left">
          <button class="tab active" data-tab-id="home" role="tab" aria-selected="true" aria-controls="tab-content">Home</button>
        </div>
        <div class="tab-bar-divider" aria-hidden="true"></div>
        <div class="tab-bar-modules" id="module-tabs" aria-label="Open modules"></div>
      </div>

      <main id="tab-content" class="tab-content" role="tabpanel" aria-label="Tab content"></main>
    </div>

    <!-- Core scripts (always loaded) -->
    <script src="./ui.js"></script>
    <script src="./tab-manager.js"></script>
    <script src="./pages/home-tab.js"></script>
    <script src="./pages/db-manager-tab.js"></script>

    <!-- Third-party libraries -->
    <script src="../node_modules/chart.js/dist/chart.umd.js"></script>

    <!-- Module renderer scripts are loaded dynamically by the bootstrapper -->
    <script type="module" src="./module-bootstrap.js"></script>
  </body>
</html>
