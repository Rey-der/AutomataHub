<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutomataHub</title>
    <link rel="stylesheet" href="./core.css" />
  </head>
  <body>
    <div id="app">
      <nav id="main-tab-bar" class="tab-bar main-tab-bar" role="tablist" aria-label="Main tabs">
        <div class="tab-bar-left">
          <button class="tab active" data-tab-id="home" role="tab" aria-selected="true" aria-controls="tab-content">Home</button>
        </div>
        <div class="tab-bar-right" id="auto-start-tabs"></div>
      </nav>

      <nav id="module-tab-bar" class="tab-bar module-tab-bar hidden" role="tablist" aria-label="Module tabs"></nav>

      <main id="tab-content" class="tab-content" role="tabpanel" aria-label="Tab content"></main>
    </div>

    <!-- Core scripts (always loaded) -->
    <script src="./ui.js"></script>
    <script src="./tab-manager.js"></script>
    <script src="./pages/home-tab.js"></script>

    <!-- Module renderer scripts are loaded dynamically by the bootstrapper -->
    <script src="./module-bootstrap.js"></script>
  </body>
</html>
